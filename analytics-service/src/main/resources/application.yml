server:
  port: 8084

spring:
  application:
    name: analytics-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/analytics_db
    username: ${DB_USER:ledgerlite}
    password: ${DB_PASSWORD:ledgerlite}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: analytics-aggregator
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ledgerlite.*
        spring.json.value.default.type: com.ledgerlite.analytics.dto.TransactionPostedEvent
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual
